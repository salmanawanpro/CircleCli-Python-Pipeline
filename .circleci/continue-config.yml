version: 2.1

parameters:
  run-build:
    type: boolean
    default: false
  # Keep false until the vercel-deploy context is configured, so CI can go
  # green on lint/unit/build/image-test first. Flip to true to enable publish.
  deploy:
    type: boolean
    default: false

jobs:
  lint-shell:
    docker:
      - image: koalaman/shellcheck-alpine:stable
    steps:
      - checkout
      - run:
          name: Shellcheck all scripts
          command: shellcheck scripts/*.sh

  unit-test:
    docker:
      - image: cimg/python:3.12.8
      # Sidecar / secondary container: off-the-shelf Postgres image
      # running alongside the primary container for the duration of the job.
      - image: cimg/postgres:16.2
        environment:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app_test
    environment:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/app_test
    steps:
      - checkout
      - restore_cache:
          keys:
            - pip-v1-{{ checksum "requirements.txt" }}-{{ checksum "tests/requirements-test.txt" }}
            - pip-v1-
      - run:
          name: Install postgres client
          command: sudo apt-get update && sudo apt-get install -y postgresql-client
      - run:
          name: Wait for Postgres sidecar
          command: |
            chmod +x scripts/wait_for_postgres.sh
            scripts/wait_for_postgres.sh localhost 5432 30
      - run:
          name: Install app + test dependencies
          command: |
            pip install --user -r requirements.txt
            pip install --user -r tests/requirements-test.txt
      - save_cache:
          key: pip-v1-{{ checksum "requirements.txt" }}-{{ checksum "tests/requirements-test.txt" }}
          paths:
            - ~/.local
      - run:
          name: Run unit tests, emit JUnit XML
          command: |
            mkdir -p test-results
            pytest --junitxml=test-results/junit.xml --cov=app tests/test_app.py
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: test-results

  build-image:
    docker:
      - image: cimg/base:2024.01
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: Build custom Docker image
          command: |
            docker build -t "app:${CIRCLE_SHA1}" .
            docker save -o image.tar "app:${CIRCLE_SHA1}"
      - persist_to_workspace:
          root: .
          paths:
            - image.tar

  image-test:
    docker:
      - image: cimg/base:2024.01
    steps:
      - checkout
      - attach_workspace:
          at: .
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: Load custom image built earlier in the pipeline
          command: docker load -i image.tar
      - run:
          name: Smoke-test the custom image against Postgres
          command: |
            chmod +x scripts/run_image_smoke.sh
            scripts/run_image_smoke.sh
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: test-results

  publish:
    docker:
      - image: cimg/node:20.11
    steps:
      - checkout
      - run:
          name: Install Vercel CLI
          command: npm install --global vercel@latest
      - run:
          name: Publish to Vercel production
          command: |
            chmod +x scripts/publish_vercel.sh
            scripts/publish_vercel.sh

workflows:
  build-test-publish:
    when: << pipeline.parameters.run-build >>
    jobs:
      - lint-shell
      - unit-test
      - build-image
      # image-test only runs after lint, unit tests, and the custom image
      # build all succeed — upstream failure skips unnecessary smoke work.
      - image-test:
          requires:
            - lint-shell
            - unit-test
            - build-image
      # Gated by pipeline parameter `deploy` (default false) so we can land a
      # green build before Vercel credentials exist. When ready: set deploy=true
      # (pipeline trigger or change the default) and ensure context vercel-deploy
      # is configured. Still main-only + restricted context.
      - publish:
          when: << pipeline.parameters.deploy >>
          context: vercel-deploy
          requires:
            - image-test
          filters:
            branches:
              only: main
