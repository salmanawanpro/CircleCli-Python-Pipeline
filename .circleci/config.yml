version: 2.1

setup: true

orbs:
  path-filtering: circleci/path-filtering@1.1.0

workflows:
  setup-workflow:
    jobs:
      # Diffs the current commit against main and sets run-build based on
      # which paths changed. Docs-only or unrelated changes never trigger a
      # Docker build, DB-backed tests, or Vercel publish.
      - path-filtering/filter:
          base-revision: main
          config-path: .circleci/continue-config.yml
          mapping: |
            app/.*          run-build true
            tests/.*        run-build true
            scripts/.*      run-build true
            Dockerfile      run-build true
            requirements.txt run-build true
            vercel.json     run-build true
            .circleci/.*    run-build true
